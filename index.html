<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ideal Autopeças</title>

    <!-- FONTES -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">

    <style>
        :root {
            --cor-principal: #e60000;
            --cor-fundo: #0d0d0d;
            --cor-card: #141414;
            --cor-texto: #ffffff;
        }

        .tema-claro {
            --cor-fundo: #ffffff;
            --cor-card: #f2f2f2;
            --cor-texto: #000000;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Roboto', sans-serif;
            background-color: var(--cor-fundo);
            color: var(--cor-texto);
            transition: 0.3s;
        }

        header {
            background-color: #000;
            border-bottom: 4px solid var(--cor-principal);
            text-align: center;
            position: relative;
        }

        header img {
            width: 100%;
            height: 280px;
            object-fit: cover;
        }

        .topo {
            padding: 20px;
        }

        .topo h1 {
            font-family: 'Poppins', sans-serif;
            color: var(--cor-principal);
            font-size: 38px;
        }

        .topo h2 a {
            color: #ccc;
            text-decoration: none;
            font-size: 15px;
        }

        .topo h2 a:hover {
            color: var(--cor-principal);
        }

        .tema-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            padding: 8px 12px;
            background: var(--cor-principal);
            border: none;
            color: white;
            cursor: pointer;
            border-radius: 5px;
            font-family: 'Poppins';
        }

        main {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 60px 20px;
        }

        .card {
            background: var(--cor-card);
            border-radius: 12px;
            padding: 40px 30px;
            width: 350px;
            max-width: 100%;
            text-align: center;
            border: 1px solid #2a2a2a;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }

        .card h3 {
            font-family: 'Poppins';
            margin-bottom: 25px;
            color: var(--cor-principal);
        }

        .link-btn {
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 12px 0;
            padding: 14px;
            border-radius: 6px;
            background: var(--cor-principal);
            color: white;
            text-decoration: none;
            font-weight: 500;
            transition: 0.25s;
        }

        .link-btn:hover {
            background: #ff1a1a;
            transform: translateY(-2px);
        }

        footer {
            text-align: center;
            padding: 20px;
            background-color: #000;
            border-top: 1px solid #222;
            font-size: 13px;
            color: #aaa;
        }

        /* RESPONSIVO (CELULAR) */
        @media (max-width: 600px) {

            header img {
                height: 180px;
            }

            .topo h1 {
                font-size: 26px;
            }

            .card {
                padding: 25px 20px;
            }

            .link-btn {
                padding: 16px;
                font-size: 16px;
            }

            .tema-btn {
                padding: 6px 10px;
                font-size: 12px;
            }
        }
    </style>
</head>

<body>

<header>
    <img src="foto1.jpeg" alt="ideal">

    <button class="tema-btn" onclick="trocarTema()">Tema</button>

    <div class="topo">
        <h2><a href="quemsomos.html">quem somos</a></h2>
        <h1>IDEAL AUTOPEÇAS</h1>
    </div>
</header>

<main>
    <div class="card">
        <h3>Contato & Redes</h3>

        <a class="link-btn" href="https://www.instagram.com/idealautopecas2021/" target="_blank">
            Instagram
        </a>

        <a class="link-btn" href="https://www.google.com/maps/place/IDEAL+AUTOPE%C3%87AS/@-23.5239403,-46.8435301,18z" target="_blank">
            Localização
        </a>

        <a class="link-btn" href="https://api.whatsapp.com/send?phone=5511995927265" target="_blank">
            WhatsApp
        </a>

    </div>
</main>

<footer>
    <p>&copy; 2026 Ideal Autopeças. Todos os direitos reservados.</p>
</footer>

<script>
    function trocarTema() {
        document.body.classList.toggle("tema-claro");
    }
</script>

</body>
</html>
